services:
  energy_db:
    image: postgres:15
    container_name: energy_db
    restart: always
    environment:
      POSTGRES_DB: energy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - energy_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy"]
      interval: 5s
      timeout: 5s
      retries: 10

  dash_app:
    build:
      context: ./dash_app
    container_name: energy_dash
    restart: always
    env_file:
      - .env
    depends_on:
      energy_db:
        condition: service_healthy
    ports:
      - "8050:8050"

  importer_csv:
    build:
      context: ./importer_csv
    container_name: importer_csv
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      energy_db:
        condition: service_healthy
    command: ["python", "/app/main.py"]

  importer_weather:
    build:
      context: ./importer_weather
    container_name: importer_weather
    restart: always
    env_file:
      - .env
    depends_on:
      energy_db:
        condition: service_healthy

  importer_price:
    build:
      context: ./importer_price
    container_name: importer_price
    restart: always
    env_file:
      - .env
    depends_on:
      energy_db:
        condition: service_healthy

  importer_solar_elering:
    build:
      context: ./importer_solar_elering
    container_name: importer_solar_elering
    restart: always
    env_file:
      - .env
    depends_on:
      energy_db:
        condition: service_healthy

  scheduler:
    build:
      context: ./scheduler
    container_name: scheduler
    restart: always
    env_file:
      - .env
    depends_on:
      energy_db:
        condition: service_healthy

volumes:
  energy_data: